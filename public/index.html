<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fire Radio | Pro Stable</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #58a6ff; --red: #f85149; --green: #3fb950; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .card { background: var(--panel); border: 1px solid #30363d; border-radius: 8px; padding: 30px; max-width: 400px; margin: 0 auto; }
        .ptt-btn { width: 100%; padding: 40px 0; font-size: 20px; font-weight: bold; border-radius: 12px; border: none; background: #21262d; color: #484f58; cursor: pointer; transition: 0.2s; }
        .ptt-btn.active { background: var(--red); color: white; box-shadow: 0 0 20px rgba(248, 81, 73, 0.4); }
        .status { margin-top: 15px; font-size: 14px; color: #8b949e; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">Radio Unit</h2>
    <input type="text" id="callsign" placeholder="Callsign (e.g. Engine 1)">
    <select id="micInput"></select>
    <button class="ptt-btn" id="pttBtn">HOLD TO TALK</button>
    <div class="status" id="status">Ready</div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io("https://fire-radio.onrender.com");
    let audioCtx, micStream, workletNode, isTalking = false;
    let nextStartTime = 0;

    // --- SOUND EFFECTS ---
    function beep(freq, len) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.02, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + len);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + len);
    }

    // --- START AUDIO SYSTEM ---
    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const code = `class P extends AudioWorkletProcessor {
                process(ins) {
                    if (ins[0][0]) this.port.postMessage(ins[0][0]);
                    return true;
                }
            } registerProcessor('p', P);`;
            await audioCtx.audioWorklet.addModule(URL.createObjectURL(new Blob([code], {type:'application/javascript'})));
        }
    }

    // --- PUSH TO TALK ---
    const pttBtn = document.getElementById('pttBtn');
    
    pttBtn.onmousedown = async () => {
        await initAudio();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        isTalking = true;
        pttBtn.classList.add('active');
        beep(1000, 0.1); // Start beep

        micStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { deviceId: document.getElementById('micInput').value, echoCancellation: true, noiseSuppression: true } 
        });
        
        const source = audioCtx.createMediaStreamSource(micStream);
        workletNode = new AudioWorkletNode(audioCtx, 'p');
        
        workletNode.port.onmessage = (e) => {
            const int16 = new Int16Array(e.data.length);
            for (let i = 0; i < e.data.length; i++) {
                // Compression & normalization to clear up the "crackly" peaks
                let s = Math.max(-1, Math.min(1, e.data[i] * 1.5)); 
                int16[i] = s * 0x7FFF;
            }
            socket.emit('audio-packet', { call: document.getElementById('callsign').value, data: int16.buffer });
        };
        source.connect(workletNode);
    };

    window.onmouseup = () => {
        if (!isTalking) return;
        isTalking = false;
        pttBtn.classList.remove('active');
        beep(500, 0.1); // End beep
        if (workletNode) workletNode.disconnect();
        if (micStream) micStream.getTracks().forEach(t => t.stop());
    };

    // --- RECEIVING (The Fix) ---
    socket.on('audio-out', (packet) => {
        if (packet.call === document.getElementById('callsign').value) return;
        if (!audioCtx) return;

        const int16 = new Int16Array(packet.data);
        const float32 = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 0x7FFF;

        const buffer = audioCtx.createBuffer(1, float32.length, audioCtx.sampleRate);
        buffer.getChannelData(0).set(float32);

        const source = audioCtx.createBufferSource();
        source.buffer = buffer;

        // Jitter Buffer Logic:
        const now = audioCtx.currentTime;
        const latency = 0.15; // 150ms buffer to stop crackling

        if (nextStartTime < now) {
            nextStartTime = now + latency;
        }

        source.connect(audioCtx.destination);
        source.start(nextStartTime);
        nextStartTime += buffer.duration;
    });

    // Populate mic list
    navigator.mediaDevices.enumerateDevices().then(devs => {
        const sel = document.getElementById('micInput');
        devs.filter(d => d.kind === 'audioinput').forEach(d => {
            sel.innerHTML += `<option value="${d.deviceId}">${d.label || 'Microphone'}</option>`;
        });
    });
</script>
</body>
</html>
