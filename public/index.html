<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fire Radio Console</title>
    <style>
        :root {
            --bg-dark: #0f111a; --panel-bg: #1e2230; --border-color: #2e3440;
            --accent-red: #ff3e3e; --accent-green: #00e676; --accent-blue: #00b0ff;
            --text-main: #f5f6f9; --text-muted: #8892b0;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 320px 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: #121620; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; }
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .channel-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; min-height: 500px; display: flex; flex-direction: column; }
        .connect-btn { width: 100%; padding: 12px; margin-bottom: 10px; cursor: pointer; border: none; font-weight: bold; background: #3b4252; color: white; border-radius: 5px; }
        .connected-active { background: var(--accent-blue) !important; }
        .unit-list-container { flex-grow: 1; background: #121620; border-radius: 4px; margin: 10px 0; padding: 10px; font-size: 12px; border: 1px solid #252b3d; }
        .unit-entry { padding: 6px 10px; margin-bottom: 4px; background: #1e2230; border-left: 3px solid var(--accent-green); }
        .ptt-btn { width: 100%; padding: 25px; font-weight: bold; border-radius: 8px; border: none; background: #2a2f3a; color: #555; text-transform: uppercase; }
        .can-talk { background: #256a42 !important; color: white !important; cursor: pointer !important; }
        .transmitting { background: var(--accent-red) !important; box-shadow: 0 0 15px var(--accent-red); animation: pulse 0.8s infinite; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.7; } }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="sidebar">
            <div class="panel">
                <h2>CONSOLE SETUP</h2>
                <div class="form-group"><label>Callsign</label><input type="text" id="callsign" value="UNIT-1"></div>
                <div class="form-group"><label>PTT Key</label><button id="keybindBtn" style="width:100%; padding:10px; background:#252b3d; color:var(--accent-blue); border:none;">SPACEBAR</button></div>
                <div class="form-group"><label>Mic</label><select id="micInput"></select></div>
                <div class="form-group"><label>Speaker</label><select id="audioOutput"></select></div>
            </div>
        </div>

        <div class="main-content">
            <div class="channel-grid">
                <div class="channel-card" id="card-fire-rto">
                    <h3>Fire RTO</h3>
                    <button class="connect-btn" data-channel="fire-rto">CONNECT</button>
                    <label style="font-size:11px"><input type="checkbox" class="monitor-toggle" data-channel="fire-rto"> MONITOR</label>
                    <div class="unit-list-container" id="units-fire-rto"></div>
                    <button class="ptt-btn" id="ptt-fire-rto" disabled>PTT IDLE</button>
                </div>
                <!-- Repeat for Ops 1 and 2 -->
                <div class="channel-card" id="card-ops-1">
                    <h3>Operations 1</h3>
                    <button class="connect-btn" data-channel="ops-1">CONNECT</button>
                    <label style="font-size:11px"><input type="checkbox" class="monitor-toggle" data-channel="ops-1"> MONITOR</label>
                    <div class="unit-list-container" id="units-ops-1"></div>
                    <button class="ptt-btn" id="ptt-ops-1" disabled>PTT IDLE</button>
                </div>
                <div class="channel-card" id="card-ops-2">
                    <h3>Operations 2</h3>
                    <button class="connect-btn" data-channel="ops-2">CONNECT</button>
                    <label style="font-size:11px"><input type="checkbox" class="monitor-toggle" data-channel="ops-2"> MONITOR</label>
                    <div class="unit-list-container" id="units-ops-2"></div>
                    <button class="ptt-btn" id="ptt-ops-2" disabled>PTT IDLE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("https://fire-radio.onrender.com");
        let pttKey = " ";
        let mediaRecorder;
        let activeChannel = null;
        let isTalking = false;

        // UI & Registry
        document.querySelectorAll('.connect-btn').forEach(btn => {
            btn.onclick = () => {
                const chan = btn.dataset.channel;
                activeChannel = (activeChannel === chan) ? null : chan;
                updateUI();
                socket.emit('update-status', { callsign: document.getElementById('callsign').value.toUpperCase(), activeChannel });
            };
        });

        function updateUI() {
            document.querySelectorAll('.connect-btn').forEach(btn => {
                const chan = btn.dataset.channel;
                const ptt = document.getElementById(`ptt-${chan}`);
                const isActive = activeChannel === chan;
                btn.innerText = isActive ? "ACTIVE" : "CONNECT";
                btn.classList.toggle('connected-active', isActive);
                ptt.disabled = !isActive;
                ptt.classList.toggle('can-talk', isActive);
            });
        }

        socket.on('unit-list-update', (reg) => {
            ['fire-rto', 'ops-1', 'ops-2'].forEach(chan => {
                const list = document.getElementById(`units-${chan}`);
                list.innerHTML = Object.values(reg).filter(u => u.activeChannel === chan)
                    .map(u => `<div class="unit-entry">${u.callsign}</div>`).join('');
            });
        });

        // TRANSMIT
        async function startTx() {
            if (!activeChannel || isTalking) return;
            isTalking = true;
            document.getElementById(`ptt-${activeChannel}`).classList.add('transmitting');
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { deviceId: document.getElementById('micInput').value, echoCancellation: true, noiseSuppression: true } 
            });
            
            // WEBM format is crucial for headers
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
            mediaRecorder.ondataavailable = async (e) => {
                if (e.data.size > 0) {
                    const reader = new FileReader();
                    reader.readAsDataURL(e.data);
                    reader.onloadend = () => {
                        socket.emit('audio-data', {
                            channel: activeChannel,
                            callsign: document.getElementById('callsign').value.toUpperCase(),
                            audio: reader.result
                        });
                    };
                }
            };
            mediaRecorder.start(250);
        }

        function stopTx() {
            if (!isTalking) return;
            isTalking = false;
            if (activeChannel) document.getElementById(`ptt-${activeChannel}`).classList.remove('transmitting');
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
        }

        window.addEventListener('keydown', (e) => { if (e.key === pttKey && !e.repeat) startTx(); });
        window.addEventListener('keyup', (e) => { if (e.key === pttKey) stopTx(); });

        // RECEIVE (Queue Management)
        let audioQueue = [];
        let isPlaying = false;

        socket.on('audio-stream', (packet) => {
            const monitor = document.querySelector(`.monitor-toggle[data-channel="${packet.channel}"]`);
            const isSelf = packet.callsign === document.getElementById('callsign').value.toUpperCase();
            
            if (!isSelf && (activeChannel === packet.channel || (monitor && monitor.checked))) {
                audioQueue.push(packet.audio);
                if (!isPlaying) playNext();
            }
        });

        function playNext() {
            if (audioQueue.length === 0) { isPlaying = false; return; }
            isPlaying = true;
            let audio = new Audio(audioQueue.shift());
            if (document.getElementById('audioOutput').value !== 'default') {
                audio.setSinkId(document.getElementById('audioOutput').value);
            }
            audio.onended = playNext;
            audio.play().catch(() => playNext());
        }

        async function initDevices() {
            const devs = await navigator.mediaDevices.enumerateDevices();
            const micSel = document.getElementById('micInput');
            const spkSel = document.getElementById('audioOutput');
            devs.forEach(d => {
                const opt = `<option value="${d.deviceId}">${d.label || d.kind}</option>`;
                if (d.kind === 'audioinput') micSel.innerHTML += opt;
                if (d.kind === 'audiooutput') spkSel.innerHTML += opt;
            });
        }
        initDevices();
    </script>
</body>
</html>
