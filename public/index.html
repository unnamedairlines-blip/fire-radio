<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fire Radio Dispatch Console</title>
    <style>
        :root {
            --bg-dark: #0f111a; --panel-bg: #1e2230; --border-color: #2e3440;
            --accent-red: #ff3e3e; --accent-green: #00e676; --accent-blue: #00b0ff;
            --text-main: #f5f6f9; --text-muted: #8892b0;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 320px 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: #121620; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; }
        
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .channel-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; min-height: 500px; display: flex; flex-direction: column; }
        .active-monitor { border-color: var(--accent-blue); }
        
        /* New Unit List Styling */
        .unit-list-container {
            flex-grow: 1;
            background: #121620;
            border-radius: 4px;
            margin: 10px 0;
            padding: 10px;
            font-size: 12px;
            overflow-y: auto;
            border: 1px solid #252b3d;
        }
        .unit-entry {
            padding: 4px 8px;
            margin-bottom: 4px;
            background: #1e2230;
            border-left: 3px solid var(--accent-blue);
            color: var(--text-main);
        }
        
        .ptt-btn { width: 100%; padding: 20px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; background: #3b4252; color: white; }
        .active-monitor .ptt-btn { background: #256a42; }
        .transmitting { background: var(--accent-red) !important; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.7; } }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="sidebar">
            <div class="panel">
                <h2>SETUP</h2>
                <div class="form-group">
                    <label>Callsign</label>
                    <input type="text" id="callsign" value="UNIT-1">
                </div>
                <div class="form-group">
                    <label>PTT Keybind</label>
                    <button id="keybindBtn" style="width:100%; padding:10px; background:#252b3d; color:var(--accent-blue); border:1px dashed var(--accent-blue); cursor:pointer;">SPACEBAR</button>
                </div>
                <div class="form-group">
                    <label>Input</label>
                    <select id="micInput"></select>
                </div>
                <div class="form-group">
                    <label>Output</label>
                    <select id="audioOutput"></select>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="channel-grid">
                <!-- Template for Channels -->
                <div class="channel-card" id="card-fire-rto">
                    <h3>Fire RTO</h3>
                    <label><input type="checkbox" class="monitor-toggle" data-channel="fire-rto"> Monitor</label>
                    <div class="unit-list-container" id="units-fire-rto">
                        <div style="color:var(--text-muted)">No units connected</div>
                    </div>
                    <button class="ptt-btn" id="ptt-fire-rto" disabled>PTT</button>
                </div>

                <div class="channel-card" id="card-ops-1">
                    <h3>Operations 1</h3>
                    <label><input type="checkbox" class="monitor-toggle" data-channel="ops-1"> Monitor</label>
                    <div class="unit-list-container" id="units-ops-1"></div>
                    <button class="ptt-btn" id="ptt-ops-1" disabled>PTT</button>
                </div>

                <div class="channel-card" id="card-ops-2">
                    <h3>Operations 2</h3>
                    <label><input type="checkbox" class="monitor-toggle" data-channel="ops-2"> Monitor</label>
                    <div class="unit-list-container" id="units-ops-2"></div>
                    <button class="ptt-btn" id="ptt-ops-2" disabled>PTT</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("https://fire-radio.onrender.com");
        let pttKey = " ";
        let isRecordingKey = false;
        let mediaRecorder;
        let activeChannel = null;

        // --- REGISTRY SYNC ---
        function syncStatus() {
            const monitored = Array.from(document.querySelectorAll('.monitor-toggle:checked'))
                                   .map(t => t.dataset.channel);
            socket.emit('update-status', {
                callsign: document.getElementById('callsign').value.toUpperCase(),
                channels: monitored
            });
        }

        document.getElementById('callsign').addEventListener('change', syncStatus);
        document.querySelectorAll('.monitor-toggle').forEach(t => t.addEventListener('change', (e) => {
            const chan = e.target.dataset.channel;
            document.getElementById(`card-${chan}`).classList.toggle('active-monitor', e.target.checked);
            document.getElementById(`ptt-${chan}`).disabled = !e.target.checked;
            syncStatus();
        }));

        socket.on('unit-list-update', (registry) => {
            const channels = ['fire-rto', 'ops-1', 'ops-2'];
            channels.forEach(chan => {
                const list = document.getElementById(`units-${chan}`);
                list.innerHTML = "";
                Object.values(registry).forEach(unit => {
                    if (unit.channels.includes(chan)) {
                        const div = document.createElement('div');
                        div.className = 'unit-entry';
                        div.innerText = unit.callsign;
                        list.appendChild(div);
                    }
                });
            });
        });

        // --- PTT LOGIC ---
        window.addEventListener('keydown', async (e) => {
            if (isRecordingKey) { pttKey = e.key; isRecordingKey = false; return; }
            if (e.key === pttKey && !activeChannel) {
                const firstActive = document.querySelector('.monitor-toggle:checked');
                if (firstActive) startTx(firstActive.dataset.channel);
            }
        });

        window.addEventListener('keyup', (e) => { if (e.key === pttKey) stopTx(); });

        async function startTx(chan) {
            activeChannel = chan;
            const btn = document.getElementById(`ptt-${chan}`);
            btn.classList.add('transmitting');
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { deviceId: document.getElementById('micInput').value } 
            });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => {
                socket.emit('audio-data', { 
                    channel: chan, 
                    callsign: document.getElementById('callsign').value, 
                    data: e.data 
                });
            };
            mediaRecorder.start(100);
        }

        function stopTx() {
            if (!activeChannel) return;
            document.getElementById(`ptt-${activeChannel}`).classList.remove('transmitting');
            mediaRecorder.stop();
            activeChannel = null;
        }

        // --- AUDIO RECEIVE ---
        socket.on('audio-stream', async (packet) => {
            const monitor = document.querySelector(`.monitor-toggle[data-channel="${packet.channel}"]`);
            if (monitor && monitor.checked && packet.callsign !== document.getElementById('callsign').value) {
                const audio = new Audio(URL.createObjectURL(new Blob([packet.data])));
                if (document.getElementById('audioOutput').value !== 'default') {
                    await audio.setSinkId(document.getElementById('audioOutput').value);
                }
                audio.play();
            }
        });

        // --- DEVICE SETUP ---
        async function initDevices() {
            const devs = await navigator.mediaDevices.enumerateDevices();
            devs.forEach(d => {
                const opt = `<option value="${d.deviceId}">${d.label || d.kind}</option>`;
                if (d.kind === 'audioinput') document.getElementById('micInput').innerHTML += opt;
                if (d.kind === 'audiooutput') document.getElementById('audioOutput').innerHTML += opt;
            });
        }
        initDevices();
    </script>
</body>
</html>
