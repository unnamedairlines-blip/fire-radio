<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fire Radio Console</title>
    <style>
        :root {
            --bg-dark: #0f111a; --panel-bg: #1e2230; --border-color: #2e3440;
            --accent-red: #ff3e3e; --accent-green: #00e676; --accent-blue: #00b0ff;
            --text-main: #f5f6f9; --text-muted: #8892b0;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 320px 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: #121620; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; }
        
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .channel-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; min-height: 550px; display: flex; flex-direction: column; }
        
        .connect-btn { width: 100%; padding: 10px; margin-bottom: 10px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; background: #3b4252; color: white; }
        .connected-active { background: var(--accent-blue) !important; }

        .unit-list-container { flex-grow: 1; background: #121620; border-radius: 4px; margin: 10px 0; padding: 10px; font-size: 12px; border: 1px solid #252b3d; }
        .unit-entry { padding: 4px 8px; margin-bottom: 4px; background: #1e2230; border-left: 3px solid var(--accent-green); }
        
        .ptt-btn { width: 100%; padding: 25px; font-weight: bold; border-radius: 8px; border: none; cursor: not-allowed; background: #2a2f3a; color: #555; }
        .can-talk { background: #256a42 !important; color: white !important; cursor: pointer !important; }
        .transmitting { background: var(--accent-red) !important; box-shadow: 0 0 15px var(--accent-red); }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="sidebar">
            <div class="panel">
                <h2>SETUP</h2>
                <div class="form-group">
                    <label>Callsign</label>
                    <input type="text" id="callsign" value="UNIT-1">
                </div>
                <div class="form-group">
                    <label>PTT Keybind</label>
                    <button id="keybindBtn" style="width:100%; padding:10px; background:#252b3d; color:var(--accent-blue); border:none; cursor:pointer;">SPACEBAR</button>
                </div>
                <div class="form-group">
                    <label>Mic Input</label>
                    <select id="micInput"></select>
                </div>
                <div class="form-group">
                    <label>Speaker Output</label>
                    <select id="audioOutput"></select>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="channel-grid">
                <!-- Channel Template -->
                <div class="channel-card" id="card-fire-rto">
                    <h3>Fire RTO</h3>
                    <button class="connect-btn" data-channel="fire-rto">CONNECT TO CHANNEL</button>
                    <label style="font-size: 12px;"><input type="checkbox" class="monitor-toggle" data-channel="fire-rto"> Monitor Audio</label>
                    <div class="unit-list-container" id="units-fire-rto"></div>
                    <button class="ptt-btn" id="ptt-fire-rto" disabled>HOLD TO TALK</button>
                </div>

                <div class="channel-card" id="card-ops-1">
                    <h3>Operations 1</h3>
                    <button class="connect-btn" data-channel="ops-1">CONNECT TO CHANNEL</button>
                    <label style="font-size: 12px;"><input type="checkbox" class="monitor-toggle" data-channel="ops-1"> Monitor Audio</label>
                    <div class="unit-list-container" id="units-ops-1"></div>
                    <button class="ptt-btn" id="ptt-ops-1" disabled>HOLD TO TALK</button>
                </div>

                <div class="channel-card" id="card-ops-2">
                    <h3>Operations 2</h3>
                    <button class="connect-btn" data-channel="ops-2">CONNECT TO CHANNEL</button>
                    <label style="font-size: 12px;"><input type="checkbox" class="monitor-toggle" data-channel="ops-2"> Monitor Audio</label>
                    <div class="unit-list-container" id="units-ops-2"></div>
                    <button class="ptt-btn" id="ptt-ops-2" disabled>HOLD TO TALK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("https://fire-radio.onrender.com");
        let pttKey = " ";
        let isRecordingKey = false;
        let mediaRecorder;
        let localStream;
        let activeChannel = null; // The channel we are "Connected" to

        // --- CONNECTION & REGISTRY ---
        document.querySelectorAll('.connect-btn').forEach(btn => {
            btn.onclick = () => {
                const chan = btn.dataset.channel;
                if (activeChannel === chan) {
                    activeChannel = null;
                } else {
                    activeChannel = chan;
                }
                updateUI();
                syncStatus();
            };
        });

        function updateUI() {
            document.querySelectorAll('.connect-btn').forEach(btn => {
                const chan = btn.dataset.channel;
                const ptt = document.getElementById(`ptt-${chan}`);
                if (activeChannel === chan) {
                    btn.innerText = "CONNECTED";
                    btn.classList.add('connected-active');
                    ptt.disabled = false;
                    ptt.classList.add('can-talk');
                } else {
                    btn.innerText = "CONNECT TO CHANNEL";
                    btn.classList.remove('connected-active');
                    ptt.disabled = true;
                    ptt.classList.remove('can-talk');
                }
            });
        }

        function syncStatus() {
            socket.emit('update-status', {
                callsign: document.getElementById('callsign').value.toUpperCase(),
                activeChannel: activeChannel
            });
        }

        socket.on('unit-list-update', (registry) => {
            ['fire-rto', 'ops-1', 'ops-2'].forEach(chan => {
                const list = document.getElementById(`units-${chan}`);
                list.innerHTML = "";
                Object.values(registry).forEach(unit => {
                    if (unit.activeChannel === chan) {
                        const div = document.createElement('div');
                        div.className = 'unit-entry';
                        div.innerText = unit.callsign;
                        list.appendChild(div);
                    }
                });
            });
        });

        // --- AUDIO ENGINE ---
        async function startTx() {
            if (!activeChannel) return;
            const btn = document.getElementById(`ptt-${activeChannel}`);
            btn.classList.add('transmitting');

            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { deviceId: document.getElementById('micInput').value } 
            });
            
            mediaRecorder = new MediaRecorder(localStream, { mimeType: 'audio/webm' });
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) {
                    socket.emit('audio-data', { 
                        channel: activeChannel, 
                        callsign: document.getElementById('callsign').value, 
                        data: e.data 
                    });
                }
            };
            mediaRecorder.start(100);
        }

        function stopTx() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (activeChannel) document.getElementById(`ptt-${activeChannel}`).classList.remove('transmitting');
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === pttKey && !e.repeat) startTx();
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === pttKey) stopTx();
        });

        socket.on('audio-stream', async (packet) => {
            const monitor = document.querySelector(`.monitor-toggle[data-channel="${packet.channel}"]`);
            // Fixed: Play if monitoring OR if connected to the channel
            if ((monitor && monitor.checked) || activeChannel === packet.channel) {
                if (packet.callsign !== document.getElementById('callsign').value) {
                    const audio = new Audio(URL.createObjectURL(new Blob([packet.data], {type: 'audio/webm'})));
                    if (document.getElementById('audioOutput').value !== 'default') {
                        await audio.setSinkId(document.getElementById('audioOutput').value);
                    }
                    audio.play();
                }
            }
        });

        async function initDevices() {
            const devs = await navigator.mediaDevices.enumerateDevices();
            devs.forEach(d => {
                const opt = `<option value="${d.deviceId}">${d.label || d.kind}</option>`;
                if (d.kind === 'audioinput') document.getElementById('micInput').innerHTML += opt;
                if (d.kind === 'audiooutput') document.getElementById('audioOutput').innerHTML += opt;
            });
        }
        initDevices();
    </script>
</body>
</html>
