<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fire Radio | Pro Stable V13</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #58a6ff; --red: #f85149; --green: #3fb950; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .dashboard { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .card { background: var(--panel); border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .ptt-btn { width: 100%; padding: 50px 0; font-size: 22px; font-weight: bold; border-radius: 12px; border: none; background: #21262d; color: #484f58; cursor: pointer; transition: 0.1s; margin-top: 10px; }
        .ptt-btn.active { background: var(--red); color: white; box-shadow: 0 0 30px rgba(248, 81, 73, 0.4); }
        .unit-list { background: #0d1117; height: 180px; overflow-y: auto; padding: 10px; border-radius: 6px; font-size: 14px; border: 1px solid #30363d; margin: 15px 0; }
        .unit-tag { padding: 8px; border-left: 4px solid var(--accent); background: #21262d; margin-bottom: 6px; border-radius: 0 4px 4px 0; font-family: monospace; }
        select, input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        label { font-size: 11px; color: #8b949e; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <div class="card">
            <h3 style="margin-top:0">Radio Config</h3>
            <label>Callsign</label>
            <input type="text" id="callsign" value="UNIT-1">
            <label>Microphone</label>
            <select id="micInput"></select>
            <label>PTT Keybind</label>
            <button id="keybindBtn" style="width:100%; padding:10px; background:#21262d; color:white; border:1px solid #30363d; cursor:pointer; border-radius:6px;">SPACEBAR</button>
        </div>
    </div>

    <div class="main">
        <div class="card">
            <h2 style="margin:0 0 15px 0">Dispatch Channel</h2>
            <label>Units Online</label>
            <div class="unit-list" id="unitList">Connecting...</div>
            <button class="ptt-btn" id="pttBtn">HOLD TO TALK</button>
            <p style="text-align:center; font-size:12px; color:#8b949e; margin-top:10px;">Buffer Drift Protection: ACTIVE</p>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io("https://fire-radio.onrender.com");
    let audioCtx, micStream, workletNode, isTalking = false, pttKey = "Space", isBinding = false;
    let nextStartTime = 0;

    // --- AUDIO WORKLET (NOISE GATE) ---
    const workletCode = `class P extends AudioWorkletProcessor { process(ins) { if (ins[0][0]) this.port.postMessage(ins[0][0]); return true; } } registerProcessor('p', P);`;

    function playBeep(freq, dur) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.02, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
            await audioCtx.audioWorklet.addModule(URL.createObjectURL(new Blob([workletCode], {type:'application/javascript'})));
        }
        if (audioCtx.state === 'suspended') await audioCtx.resume();
    }

    // --- KEYBINDING ---
    document.getElementById('keybindBtn').onclick = () => { isBinding = true; document.getElementById('keybindBtn').innerText = "..."; };
    window.onkeydown = (e) => {
        if (isBinding) { pttKey = e.code; document.getElementById('keybindBtn').innerText = pttKey.toUpperCase(); isBinding = false; return; }
        if (e.code === pttKey && !e.repeat) startTX();
    };
    window.onkeyup = (e) => { if (e.code === pttKey) stopTX(); };

    // --- TX ---
    const pttBtn = document.getElementById('pttBtn');
    pttBtn.onmousedown = startTX;
    window.onmouseup = stopTX;

    async function startTX() {
        if (isTalking) return;
        await initAudio();
        isTalking = true;
        pttBtn.classList.add('active');
        playBeep(880, 0.08); // Start beep

        micStream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: document.getElementById('micInput').value, echoCancellation: true } });
        const source = audioCtx.createMediaStreamSource(micStream);
        workletNode = new AudioWorkletNode(audioCtx, 'p');
        
        workletNode.port.onmessage = (e) => {
            const int16 = new Int16Array(e.data.length);
            for (let i = 0; i < e.data.length; i++) int16[i] = Math.max(-1, Math.min(1, e.data[i] * 1.5)) * 0x7FFF;
            socket.emit('audio-packet', { call: document.getElementById('callsign').value, data: int16.buffer });
        };
        source.connect(workletNode);
    }

    function stopTX() {
        if (!isTalking) return;
        isTalking = false;
        pttBtn.classList.remove('active');
        playBeep(440, 0.1); // End beep
        if (workletNode) workletNode.disconnect();
        if (micStream) micStream.getTracks().forEach(t => t.stop());
    }

    // --- RX (THE FIX) ---
    socket.on('audio-out', (packet) => {
        if (packet.call === document.getElementById('callsign').value || !audioCtx) return;

        const int16 = new Int16Array(packet.data);
        const float32 = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 0x7FFF;

        const buffer = audioCtx.createBuffer(1, float32.length, audioCtx.sampleRate);
        buffer.getChannelData(0).set(float32);

        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        
        // DRIFT GUARD: If we are more than 200ms behind, snap to the present.
        // This prevents the audio from "going downhill" over time.
        if (nextStartTime < now || nextStartTime > now + 0.25) {
            nextStartTime = now + 0.05; 
        }

        source.start(nextStartTime);
        nextStartTime += buffer.duration;
    });

    // --- UNIT LIST ---
    socket.on('connect', () => { socket.emit('update-status', { callsign: document.getElementById('callsign').value, activeChannel: 'dispatch' }); });
    socket.on('unit-list-update', (units) => {
        document.getElementById('unitList').innerHTML = Object.values(units).map(u => `<div class="unit-tag">${u.callsign}</div>`).join('') || "No units";
    });

    navigator.mediaDevices.enumerateDevices().then(devs => {
        const sel = document.getElementById('micInput');
        devs.filter(d => d.kind === 'audioinput').forEach(d => sel.innerHTML += `<option value="${d.deviceId}">${d.label || 'Mic'}</option>`);
    });
</script>
</body>
</html>
