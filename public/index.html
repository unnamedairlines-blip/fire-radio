<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fire Radio | Crystal Clear V8</title>
    <link rel="icon" href="data:,">
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #58a6ff; --red: #f85149; --green: #3fb950; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .dashboard { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .card { background: var(--panel); border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .ptt-btn { width: 100%; padding: 50px 0; font-size: 22px; font-weight: bold; border-radius: 12px; border: none; background: #21262d; color: #484f58; transition: 0.2s; cursor: not-allowed; }
        .ptt-btn.ready { background: #238636; color: white; cursor: pointer; }
        .ptt-btn.active { background: var(--red); box-shadow: 0 0 30px rgba(248, 81, 73, 0.5); transform: scale(0.98); }
        .unit-list { background: #0d1117; height: 180px; overflow-y: auto; padding: 10px; border-radius: 6px; font-size: 14px; border: 1px solid #30363d; margin: 15px 0; }
        .unit-tag { padding: 8px; border-left: 4px solid var(--green); background: #21262d; margin-bottom: 6px; border-radius: 0 4px 4px 0; }
        .conn-btn { width: 100%; padding: 12px; font-weight: bold; border-radius: 6px; border: none; background: #30363d; color: white; cursor: pointer; margin-bottom: 15px; }
        .conn-btn.active { background: var(--accent); }
        select, input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <div class="card">
            <h3 style="margin-top:0">Radio Config</h3>
            <label style="font-size:12px; color:#8b949e">CALLSIGN</label>
            <input type="text" id="callsign" value="UNIT-1">
            <label style="font-size:12px; color:#8b949e">MIC INPUT</label>
            <select id="micInput"></select>
            <label style="font-size:12px; color:#8b949e">PTT KEY</label>
            <button id="keybindBtn" style="width:100%; padding:10px; background:#21262d; color:white; border:1px solid #30363d; cursor:pointer;">SPACEBAR</button>
        </div>
    </div>

    <div class="main">
        <div class="card">
            <h2 style="margin:0 0 15px 0">Main Channel</h2>
            <button class="conn-btn" id="connBtn">CONNECT TO DISPATCH</button>
            <div class="unit-list" id="unitList"></div>
            <button class="ptt-btn" id="pttBtn" disabled>OFF AIR</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io("https://fire-radio.onrender.com");
    let pttKey = "Space", isBinding = false, isTalking = false, active = false;
    let audioCtx, micStream, workletNode, nextStartTime = 0;

    // AUDIO WORKLET: Handles raw data and basic volume normalization
    const workletCode = `
        class RadioProcessor extends AudioWorkletProcessor {
            constructor() { 
                super(); 
                this.buf = new Float32Array(1024); 
                this.ptr = 0; 
            }
            process(ins) {
                const input = ins[0][0];
                if (!input) return true;
                for (let i = 0; i < input.length; i++) {
                    // Normalize very slightly to prevent clipping before it hits the socket
                    this.buf[this.ptr++] = input[i];
                    if (this.ptr >= this.buf.length) {
                        this.port.postMessage(this.buf);
                        this.ptr = 0;
                    }
                }
                return true;
            }
        }
        registerProcessor('radio-processor', RadioProcessor);
    `;

    function playBeep(freq, duration, volume) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    document.getElementById('keybindBtn').onclick = () => { isBinding = true; document.getElementById('keybindBtn').innerText = "PUSH KEY..."; };

    window.onkeydown = (e) => {
        if (isBinding) {
            e.preventDefault(); pttKey = e.code;
            document.getElementById('keybindBtn').innerText = pttKey.toUpperCase();
            isBinding = false; updateUI(); return;
        }
        if (e.code === pttKey && !e.repeat && active) startTX();
    };
    window.onkeyup = (e) => { if (e.code === pttKey) stopTX(); };

    document.getElementById('connBtn').onclick = async () => {
        active = !active;
        if (!audioCtx) {
            // REMOVED FORCED SAMPLE RATE: Letting the browser choose its native hardware rate
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            await audioCtx.audioWorklet.addModule(URL.createObjectURL(new Blob([workletCode], {type:'application/javascript'})));
        }
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        updateUI();
        socket.emit('update-status', { callsign: document.getElementById('callsign').value, activeChannel: active ? 'dispatch' : null });
    };

    function updateUI() {
        const btn = document.getElementById('connBtn');
        const ptt = document.getElementById('pttBtn');
        btn.innerText = active ? "CONNECTED" : "CONNECT TO DISPATCH";
        btn.classList.toggle('active', active);
        ptt.disabled = !active;
        ptt.classList.toggle('ready', active);
        ptt.innerText = active ? `HOLD ${pttKey.replace('Key','')}` : "OFF AIR";
    }

    async function startTX() {
        if (isTalking) return;
        isTalking = true;
        playBeep(1200, 0.08, 0.03); // Quick high-pitched chirp
        document.getElementById('pttBtn').classList.add('active');

        micStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { 
                deviceId: document.getElementById('micInput').value, 
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
            } 
        });
        
        const source = audioCtx.createMediaStreamSource(micStream);
        
        // VOICE FILTER: Removes the low rumble
        const filter = audioCtx.createBiquadFilter();
        filter.type = "highpass";
        filter.frequency.value = 250; 

        workletNode = new AudioWorkletNode(audioCtx, 'radio-processor');
        workletNode.port.onmessage = (e) => {
            const int16 = new Int16Array(e.data.length);
            for (let i = 0; i < e.data.length; i++) {
                // Amplify slightly for clarity
                let s = e.data[i] * 1.2; 
                int16[i] = Math.max(-1, Math.min(1, s)) * 0x7FFF;
            }
            socket.emit('audio-packet', { call: document.getElementById('callsign').value, data: int16.buffer });
        };

        source.connect(filter);
        filter.connect(workletNode);
    }

    function stopTX() {
        if(!isTalking) return;
        isTalking = false;
        playBeep(600, 0.1, 0.03); // Lower tone blip
        if (workletNode) workletNode.disconnect();
        if (micStream) micStream.getTracks().forEach(t => t.stop());
        document.getElementById('pttBtn').classList.remove('active');
    }

    socket.on('audio-out', (packet) => {
        if (packet.call === document.getElementById('callsign').value || !active) return;

        const int16 = new Int16Array(packet.data);
        const float32 = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 0x7FFF;

        const buffer = audioCtx.createBuffer(1, float32.length, audioCtx.sampleRate);
        buffer.getChannelData(0).set(float32);

        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        
        // COMPRESSOR: Makes voices sound "Full" and consistent
        const compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.setValueAtTime(-20, audioCtx.currentTime);
        compressor.ratio.setValueAtTime(4, audioCtx.currentTime);

        source.connect(compressor);
        compressor.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        // ULTRA-LOW LATENCY SYNC: 60ms buffer
        if (nextStartTime < now) {
            nextStartTime = now + 0.06; 
        } else if (nextStartTime > now + 0.2) {
            nextStartTime = now + 0.06;
        }
        
        source.start(nextStartTime);
        nextStartTime += buffer.duration;
    });

    socket.on('unit-list-update', (reg) => {
        document.getElementById('unitList').innerHTML = Object.values(reg).filter(u => u.activeChannel === 'dispatch')
            .map(u => `<div class="unit-tag">${u.callsign}</div>`).join('');
    });

    navigator.mediaDevices.enumerateDevices().then(devs => {
        const sel = document.getElementById('micInput');
        devs.filter(d => d.kind === 'audioinput').forEach(d => sel.innerHTML += `<option value="${d.deviceId}">${d.label || 'Mic'}</option>`);
    });
</script>
</body>
</html>
