<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fire Radio | Pro Stable V15</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #58a6ff; --red: #f85149; --green: #3fb950; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; }
        .dashboard { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .card { background: var(--panel); border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .ptt-btn { width: 100%; padding: 50px 0; font-size: 22px; font-weight: bold; border-radius: 12px; border: none; background: #21262d; color: #484f58; transition: 0.2s; cursor: not-allowed; margin-top: 10px; }
        .ptt-btn.ready { background: #238636; color: white; cursor: pointer; }
        .ptt-btn.active { background: var(--red); box-shadow: 0 0 30px rgba(248, 81, 73, 0.5); transform: scale(0.98); }
        .unit-tag { padding: 8px; border-left: 4px solid var(--green); background: #21262d; margin-bottom: 6px; border-radius: 0 4px 4px 0; font-family: monospace; }
        .unit-tag.speaking { border-left-color: var(--red); background: rgba(248, 81, 73, 0.14); color: white; box-shadow: inset 0 0 0 1px rgba(248, 81, 73, 0.35); }
        .unit-tag.speaking::after { content: "TRANSMITTING"; float: right; color: var(--red); font-size: 11px; font-weight: bold; }
        .channel-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
        .channel-panel { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
        .channel-panel.connected { border-color: var(--accent); box-shadow: inset 0 0 0 1px rgba(88, 166, 255, 0.35); }
        .channel-panel.monitoring { border-color: #d29922; box-shadow: inset 0 0 0 1px rgba(210, 153, 34, 0.35); }
        .channel-panel h3 { margin: 0 0 10px 0; font-size: 15px; }
        .channel-panel .conn-btn { margin-bottom: 10px; }
        .channel-units { height: 150px; overflow-y: auto; padding: 8px; border-radius: 6px; background: #010409; border: 1px solid #21262d; font-size: 13px; }
        .conn-btn { width: 100%; padding: 12px; font-weight: bold; border-radius: 6px; border: none; background: #30363d; color: white; cursor: pointer; margin-bottom: 15px; }
        .conn-btn.active { background: var(--accent); }
        .monitor-btn { width: 100%; padding: 10px; font-weight: bold; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: white; cursor: pointer; margin-bottom: 10px; }
        .monitor-btn.active { background: #d29922; color: #010409; border-color: #d29922; }
        .monitor-btn:disabled { opacity: 0.42; cursor: not-allowed; }
        .tone-board { margin-top: 16px; border-top: 1px solid #30363d; padding-top: 14px; }
        .tone-board h3 { margin: 0 0 10px 0; font-size: 15px; }
        .tone-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
        .tone-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
        .tone-btn { padding: 12px 8px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: white; cursor: pointer; font-weight: bold; }
        .tone-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .hidden { display: none; }
        select, input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        .mic-meter { height: 12px; background: #010409; border: 1px solid #30363d; border-radius: 999px; overflow: hidden; margin-top: 8px; }
        .mic-meter-fill { width: 0%; height: 100%; background: var(--green); transition: width 0.08s linear, background 0.08s linear; }
        .mic-meter-fill.hot { background: #d29922; }
        .mic-meter-fill.clip { background: var(--red); }
        .mic-meter-label { display: block; margin-top: 6px; color: #8b949e; font-size: 11px; }
        label { font-size: 11px; color: #8b949e; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="sidebar">
        <div class="card">
            <h3 style="margin-top:0">Radio Config</h3>
            <label>Callsign</label>
            <input type="text" id="callsign" value="" placeholder="Enter callsign" required>
            <label>Roblox Username</label>
            <input type="text" id="robloxUsername" value="" placeholder="Optional">
            <label>Microphone</label>
            <select id="micInput"></select>
            <label>PTT Keybind</label>
            <button id="keybindBtn" style="width:100%; padding:10px; background:#21262d; color:white; border:1px solid #30363d; cursor:pointer; border-radius:6px;">X</button>
            <div class="mic-meter" aria-hidden="true">
                <div class="mic-meter-fill" id="micMeterFill"></div>
            </div>
            <span class="mic-meter-label" id="micMeterLabel">Mic inactive</span>
            <p style="font-size: 11px; color: #8b949e; margin-top: 15px;">Status: <span id="socketStatus">Connecting...</span></p>
            <p style="font-size: 11px; color: #8b949e; margin-top: 4px;">Audio: <span id="audioStatus">Idle</span></p>
            <div class="tone-board">
                <h3>Tone Board</h3>
                <div id="toneLock">
                    <label>Tone Code</label>
                    <div class="tone-row">
                        <input type="password" id="toneCode" placeholder="Enter code">
                        <button class="tone-btn" id="toneUnlockBtn">UNLOCK</button>
                    </div>
                </div>
                <div id="tonePanel" class="hidden">
                    <label>Tone Channel</label>
                    <select id="toneChannel"></select>
                    <div class="tone-grid" id="toneGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="card">
            <h2 style="margin:0 0 15px 0">Radio Channels</h2>
            <div class="channel-grid" id="channelGrid"></div>
            <button class="ptt-btn" id="pttBtn" disabled>OFF AIR</button>
            <p style="font-size: 11px; color: #8b949e; margin-top: 15px; text-align: center;">Resampling & Stream-Sync: ENABLED</p>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const ipcRenderer = window.require ? window.require('electron').ipcRenderer : null;
    const socket = io("https://fire-radio.onrender.com");
    const PACKET_SIZE = 1024;
    const JITTER_TARGET = 0.12;
    const JITTER_MIN = 0.03;
    const JITTER_MAX = 0.35;
    const MAX_INT16 = 0x7FFF;
    const TX_TARGET_RMS = 0.16;
    const TX_NOISE_FLOOR = 0.004;
    const TX_GATE_FLOOR = 0.008;
    const TX_MIN_GAIN = 0.35;
    const TX_MAX_GAIN = 10.0;
    const TX_LIMIT = 0.82;
    const RX_TARGET_RMS = 0.18;
    const RX_NOISE_FLOOR = 0.003;
    const RX_MIN_GAIN = 0.35;
    const RX_MAX_GAIN = 12.0;
    const RX_LIMIT = 0.82;
    const RX_OUTPUT_GAIN = 1.15;
    const CHANNELS = [
        { id: 'fire-rto', name: 'Fire RTO' },
        { id: 'operations-1', name: 'Operations 1' },
        { id: 'operations-2', name: 'Operations 2' }
    ];
    const TONES = [
        { id: 'alert', name: 'Alert', pairs: [[880, 0.22], [660, 0.22], [880, 0.22], [660, 0.22]] },
        { id: 'dispatch', name: 'Dispatch', pairs: [[600, 0.35], [900, 0.35], [600, 0.35]] },
        { id: 'evac', name: 'Evac', pairs: [[1200, 0.18], [0, 0.08], [1200, 0.18], [0, 0.08], [1200, 0.18]] },
        { id: 'all-clear', name: 'All Clear', pairs: [[523, 0.18], [659, 0.18], [784, 0.35]] }
    ];
    let pttKeyCode = "KeyX", pttKeyAccelerator = "X", isBinding = false, isTalking = false, txHeld = false, active = false, activeChannel = null;
    let isRequestingTx = false;
    let pointerPttId = null;
    let audioCtx, micStream, sourceNode, highpassNode, lowpassNode, workletNode, monitorGain, nextStartTime = 0;
    let txBuffer = new Float32Array(PACKET_SIZE), txOffset = 0, txSequence = 0;
    let txPackets = 0, rxPackets = 0, lastMicPeak = 0;
    let micMeterLevel = 0, lastMeterUpdate = 0;
    const rxGainByCallsign = new Map();
    let lastAcceptedCallsign = '';
    let socketConnected = false;
    let monitorChannel = null;
    let txPacketGain = 1;
    let toneBoardCode = '';
    let toneSequence = 0;

    const workletCode = `
        class P extends AudioWorkletProcessor {
            process(ins) {
                const input = ins[0][0];
                if (!input) return true;

                this.port.postMessage(new Float32Array(input));
                return true;
            }
        }
        registerProcessor('radio-processor', P);
    `;

    function playTone(freq, start, dur, volume = 0.035, type = "square") {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        const t = audioCtx.currentTime + start;

        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(0.001, t);
        g.gain.linearRampToValueAtTime(volume, t + 0.004);
        g.gain.setValueAtTime(volume, t + Math.max(0.004, dur - 0.012));
        g.gain.linearRampToValueAtTime(0.001, t + dur);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + dur + 0.02);
    }

    function playNoiseBurst(start, dur, volume = 0.012) {
        if (!audioCtx) return;

        const sampleCount = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
        const buffer = audioCtx.createBuffer(1, sampleCount, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);

        for (let i = 0; i < sampleCount; i++) {
            data[i] = (Math.random() * 2 - 1) * (1 - i / sampleCount);
        }

        const src = audioCtx.createBufferSource();
        const filter = audioCtx.createBiquadFilter();
        const g = audioCtx.createGain();
        const t = audioCtx.currentTime + start;

        filter.type = "bandpass";
        filter.frequency.value = 1800;
        filter.Q.value = 1.4;
        g.gain.setValueAtTime(volume, t);
        g.gain.linearRampToValueAtTime(0.001, t + dur);

        src.buffer = buffer;
        src.connect(filter);
        filter.connect(g);
        g.connect(audioCtx.destination);
        src.start(t);
        src.stop(t + dur);
    }

    function playRadioBeep(type) {
        if (!audioCtx) return;

        if (type === "start") {
            playNoiseBurst(0, 0.025, 0.01);
            playTone(1800, 0.018, 0.045, 0.018, "square");
            playTone(1200, 0.066, 0.045, 0.016, "square");
        } else {
            playTone(900, 0, 0.07, 0.018, "square");
            playNoiseBurst(0.065, 0.03, 0.009);
        }
    }

    function setAudioStatus(text) {
        document.getElementById('audioStatus').innerText = text;
    }

    function setCallsignStatus(text) {
        document.getElementById('socketStatus').innerText = text;
    }

    function getChannelName(channelId) {
        const channel = CHANNELS.find(c => c.id === channelId);
        return channel ? channel.name : '';
    }

    function refreshConnectionStatus() {
        if (!socketConnected) {
            setCallsignStatus("OFFLINE");
            return;
        }

        if (!getRequestedCallsign()) {
            setCallsignStatus("ONLINE - ENTER CALLSIGN");
            return;
        }

        const transmitStatus = activeChannel ? `TX ${getChannelName(activeChannel)}` : "NO TX CHANNEL";
        const monitorStatus = monitorChannel ? ` | MON ${getChannelName(monitorChannel)}` : "";
        setCallsignStatus(`ONLINE - ${transmitStatus}${monitorStatus}`);
    }

    function getRequestedCallsign() {
        return document.getElementById('callsign').value.trim().toUpperCase();
    }

    function requireCallsign() {
        const callsignInput = document.getElementById('callsign');
        const callsign = getRequestedCallsign();
        if (callsign) {
            callsignInput.value = callsign;
            return callsign;
        }

        refreshConnectionStatus();
        setAudioStatus("Callsign required");
        callsignInput.focus();
        return null;
    }

    function resetTxBuffer() {
        txOffset = 0;
    }

    function normalizeTransmitAudio(samples, length) {
        let sumSquares = 0;

        for (let i = 0; i < length; i++) {
            sumSquares += samples[i] * samples[i];
        }

        const rms = length ? Math.sqrt(sumSquares / length) : 0;
        if (rms < TX_NOISE_FLOOR) {
            return new Float32Array(length);
        }

        const targetGain = rms > TX_NOISE_FLOOR
            ? Math.min(TX_MAX_GAIN, Math.max(TX_MIN_GAIN, TX_TARGET_RMS / rms))
            : 1;
        const smoothing = targetGain < txPacketGain ? 0.75 : 0.55;
        txPacketGain = txPacketGain * (1 - smoothing) + targetGain * smoothing;

        const output = new Float32Array(length);
        const gateMix = rms < TX_GATE_FLOOR ? 0.75 : 1;
        for (let i = 0; i < length; i++) {
            let value = samples[i] * gateMix * txPacketGain;
            if (value > TX_LIMIT) value = TX_LIMIT + (value - TX_LIMIT) * 0.12;
            if (value < -TX_LIMIT) value = -TX_LIMIT + (value + TX_LIMIT) * 0.12;
            output[i] = Math.max(-1, Math.min(1, value));
        }

        return output;
    }

    function emitAudioPacket(samples, length = samples.length) {
        const normalizedSamples = normalizeTransmitAudio(samples, length);
        const int16 = new Int16Array(length);
        for (let i = 0; i < length; i++) {
            int16[i] = normalizedSamples[i] * MAX_INT16;
        }

        socket.emit('audio-packet', {
            call: document.getElementById('callsign').value,
            channel: activeChannel,
            data: int16.buffer,
            sampleRate: audioCtx.sampleRate,
            seq: txSequence++
        });
        txPackets++;
        setAudioStatus(`TX ${txPackets} | RX ${rxPackets} | Peak ${lastMicPeak.toFixed(2)}`);
    }

    function queueMicSamples(samples) {
        let readOffset = 0;
        for (let i = 0; i < samples.length; i++) {
            lastMicPeak = Math.max(lastMicPeak * 0.96, Math.abs(samples[i]));
        }

        while (readOffset < samples.length) {
            const copyLength = Math.min(PACKET_SIZE - txOffset, samples.length - readOffset);
            txBuffer.set(samples.subarray(readOffset, readOffset + copyLength), txOffset);
            txOffset += copyLength;
            readOffset += copyLength;

            if (txOffset === PACKET_SIZE) {
                emitAudioPacket(txBuffer);
                resetTxBuffer();
            }
        }
    }

    function normalizePlaybackAudio(samples, callsign) {
        let sumSquares = 0;

        for (let i = 0; i < samples.length; i++) {
            sumSquares += samples[i] * samples[i];
        }

        const rms = samples.length ? Math.sqrt(sumSquares / samples.length) : 0;
        const targetGain = rms > RX_NOISE_FLOOR
            ? Math.min(RX_MAX_GAIN, Math.max(RX_MIN_GAIN, RX_TARGET_RMS / rms))
            : 1;
        const previousGain = rxGainByCallsign.get(callsign) || 1;
        const smoothing = targetGain < previousGain ? 0.85 : 0.65;
        const playbackGain = previousGain * (1 - smoothing) + targetGain * smoothing;
        rxGainByCallsign.set(callsign, playbackGain);

        const output = new Float32Array(samples.length);
        const finalGain = playbackGain * RX_OUTPUT_GAIN;
        for (let i = 0; i < samples.length; i++) {
            let value = samples[i] * finalGain;
            if (value > RX_LIMIT) value = RX_LIMIT + (value - RX_LIMIT) * 0.12;
            if (value < -RX_LIMIT) value = -RX_LIMIT + (value + RX_LIMIT) * 0.12;
            value = Math.max(-1, Math.min(1, value));
            output[i] = value;
        }

        return output;
    }

    function synthesizeTone(tone) {
        const sampleRate = audioCtx.sampleRate;
        const pause = Math.floor(sampleRate * 0.04);
        const totalSamples = tone.pairs.reduce((sum, pair) => sum + Math.floor(sampleRate * pair[1]) + pause, 0);
        const samples = new Float32Array(totalSamples);
        let offset = 0;

        tone.pairs.forEach(([freq, duration]) => {
            const length = Math.floor(sampleRate * duration);
            for (let i = 0; i < length; i++) {
                const envelope = Math.min(1, i / 120) * Math.min(1, (length - i) / 240);
                samples[offset + i] = freq ? Math.sin((2 * Math.PI * freq * i) / sampleRate) * 0.22 * envelope : 0;
            }
            offset += length + pause;
        });

        return samples;
    }

    function playLocalSamples(samples) {
        const buf = audioCtx.createBuffer(1, samples.length, audioCtx.sampleRate);
        buf.getChannelData(0).set(samples);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(audioCtx.destination);
        src.start();
    }

    function emitToneSamples(samples, channel) {
        let offset = 0;
        while (offset < samples.length) {
            const length = Math.min(PACKET_SIZE, samples.length - offset);
            const int16 = new Int16Array(length);
            for (let i = 0; i < length; i++) {
                int16[i] = Math.max(-1, Math.min(1, samples[offset + i])) * MAX_INT16;
            }

            socket.emit('tone-packet', {
                code: toneBoardCode,
                channel,
                data: int16.buffer,
                sampleRate: audioCtx.sampleRate,
                seq: toneSequence++
            }, (response) => {
                if (!response || !response.ok) {
                    setAudioStatus(response && response.reason === 'bad-code' ? "Tone code rejected" : "Tone failed");
                }
            });
            offset += length;
        }
    }

    async function playToneBoardTone(toneId) {
        const channel = document.getElementById('toneChannel').value;
        const tone = TONES.find(t => t.id === toneId);
        if (!tone || !channel) return;

        try {
            await ensureAudioContext();
            const samples = synthesizeTone(tone);
            playLocalSamples(samples);
            emitToneSamples(samples, channel);
            setAudioStatus(`Tone ${tone.name} -> ${getChannelName(channel)}`);
        } catch (err) {
            console.error('Unable to play tone', err);
            setAudioStatus("Tone error");
        }
    }

    function unlockToneBoard() {
        toneBoardCode = document.getElementById('toneCode').value.trim();
        if (!toneBoardCode) {
            setAudioStatus("Tone code required");
            return;
        }

        document.getElementById('toneLock').classList.add('hidden');
        document.getElementById('tonePanel').classList.remove('hidden');
        setAudioStatus("Tone board ready");
    }

    function updateMicMeter(samples) {
        let peak = 0;
        for (let i = 0; i < samples.length; i++) {
            peak = Math.max(peak, Math.abs(samples[i]));
        }

        micMeterLevel = Math.max(peak, micMeterLevel * 0.82);

        const now = performance.now();
        if (now - lastMeterUpdate < 45) return;
        lastMeterUpdate = now;

        const fill = document.getElementById('micMeterFill');
        const label = document.getElementById('micMeterLabel');
        const percent = Math.min(100, Math.round(micMeterLevel * 100));

        fill.style.width = `${percent}%`;
        fill.classList.toggle('hot', percent >= 70 && percent < 90);
        fill.classList.toggle('clip', percent >= 90);

        if (!active || !micStream) {
            label.innerText = "Mic inactive";
        } else if (percent < 8) {
            label.innerText = "Input quiet";
        } else if (percent < 70) {
            label.innerText = `Input good - ${percent}%`;
        } else if (percent < 90) {
            label.innerText = `Input loud - ${percent}%`;
        } else {
            label.innerText = `Input clipping - ${percent}%`;
        }
    }

    function resetMicMeter() {
        micMeterLevel = 0;
        const fill = document.getElementById('micMeterFill');
        const label = document.getElementById('micMeterLabel');
        if (fill) {
            fill.style.width = "0%";
            fill.classList.remove('hot', 'clip');
        }
        if (label) label.innerText = "Mic inactive";
    }

    function resampleLinear(input, fromRate, toRate) {
        if (!fromRate || fromRate === toRate) return input;

        const ratio = fromRate / toRate;
        const outputLength = Math.max(1, Math.round(input.length / ratio));
        const output = new Float32Array(outputLength);

        for (let i = 0; i < outputLength; i++) {
            const sourceIndex = i * ratio;
            const index = Math.floor(sourceIndex);
            const nextIndex = Math.min(index + 1, input.length - 1);
            const fraction = sourceIndex - index;
            output[i] = input[index] + (input[nextIndex] - input[index]) * fraction;
        }

        return output;
    }

    async function ensureAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
            await audioCtx.audioWorklet.addModule(URL.createObjectURL(new Blob([workletCode], {type:'application/javascript'})));
        }
        await audioCtx.resume();
    }

    async function startMicPipeline() {
        if (micStream && workletNode) return;
        setAudioStatus("Opening mic...");

        const selectedDevice = document.getElementById('micInput').value;
        micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
                deviceId: selectedDevice ? { exact: selectedDevice } : undefined,
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: false,
                sampleRate: audioCtx.sampleRate
            }
        });

        sourceNode = audioCtx.createMediaStreamSource(micStream);

        highpassNode = audioCtx.createBiquadFilter();
        highpassNode.type = "highpass";
        highpassNode.frequency.value = 80;
        highpassNode.Q.value = 0.7;

        lowpassNode = audioCtx.createBiquadFilter();
        lowpassNode.type = "lowpass";
        lowpassNode.frequency.value = 6500;
        lowpassNode.Q.value = 0.7;

        workletNode = new AudioWorkletNode(audioCtx, 'radio-processor');
        monitorGain = audioCtx.createGain();
        monitorGain.gain.value = 0;

        workletNode.port.onmessage = (e) => {
            updateMicMeter(e.data);
            if (isTalking && active) queueMicSamples(e.data);
        };

        sourceNode.connect(highpassNode);
        highpassNode.connect(lowpassNode);
        lowpassNode.connect(workletNode);
        workletNode.connect(monitorGain);
        monitorGain.connect(audioCtx.destination);
        setAudioStatus("Mic ready");
    }

    function stopMicPipeline() {
        if (workletNode) {
            workletNode.port.onmessage = null;
            workletNode.disconnect();
        }
        if (monitorGain) monitorGain.disconnect();
        if (lowpassNode) lowpassNode.disconnect();
        if (highpassNode) highpassNode.disconnect();
        if (sourceNode) sourceNode.disconnect();
        if (micStream) micStream.getTracks().forEach(t => t.stop());

        sourceNode = null;
        highpassNode = null;
        lowpassNode = null;
        workletNode = null;
        monitorGain = null;
        micStream = null;
        resetMicMeter();
    }

    function codeToAccelerator(code) {
        const map = {
            Space: 'Space',
            Minus: '-',
            Equal: '=',
            BracketLeft: '[',
            BracketRight: ']',
            Backslash: '\\',
            Semicolon: ';',
            Quote: "'",
            Comma: ',',
            Period: '.',
            Slash: '/',
            Backquote: '`'
        };

        if (code.startsWith('Key')) return code.slice(3);
        if (code.startsWith('Digit')) return code.slice(5);
        return map[code] || code;
    }

    document.getElementById('keybindBtn').onclick = () => { isBinding = true; document.getElementById('keybindBtn').innerText = "PUSH KEY..."; };
    window.onkeydown = (e) => {
        if (isBinding) {
            e.preventDefault();
            pttKeyCode = e.code;
            pttKeyAccelerator = codeToAccelerator(e.code);
            document.getElementById('keybindBtn').innerText = pttKeyAccelerator.toUpperCase();
            isBinding = false; updateUI(); registerGlobalPtt(); return;
        }
        if (e.code === pttKeyCode && !e.repeat && active) {
            e.preventDefault();
            startTX();
        }
    };
    window.onkeyup = (e) => {
        if (e.code === pttKeyCode) {
            e.preventDefault();
            stopTX();
        }
    };
    window.onblur = stopTX;

    const pttButton = document.getElementById('pttBtn');
    pttButton.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        if (!active) return;
        pointerPttId = e.pointerId;
        pttButton.setPointerCapture(e.pointerId);
        startTX();
    });
    pttButton.addEventListener('pointerup', (e) => {
        if (pointerPttId !== e.pointerId) return;
        pointerPttId = null;
        stopTX();
    });
    pttButton.addEventListener('pointercancel', (e) => {
        if (pointerPttId !== e.pointerId) return;
        pointerPttId = null;
        stopTX();
    });

    async function setActiveChannel(channelId) {
        if (!requireCallsign()) return;

        try {
            await ensureAudioContext();
            const nextChannel = activeChannel === channelId ? null : channelId;
            if (isTalking) stopTX(false);
            active = Boolean(nextChannel);
            activeChannel = nextChannel;
            if (monitorChannel && monitorChannel === activeChannel) {
                monitorChannel = null;
                socket.emit('monitor-channel', null);
            }
            nextStartTime = 0;

            if (active) {
                await startMicPipeline();
            } else {
                stopTX(false);
                stopMicPipeline();
                setAudioStatus(`Idle | TX ${txPackets} | RX ${rxPackets}`);
            }

            updateUI();
            syncWithServer();
        } catch (err) {
            console.error('Unable to connect audio', err);
            active = false;
            stopTX(false);
            stopMicPipeline();
            updateUI();
            setAudioStatus("Mic error");
            document.getElementById('socketStatus').innerText = "MIC ERROR";
        }
    }

    async function setMonitorChannel(channelId) {
        if (!requireCallsign()) return;
        if (channelId === activeChannel) {
            if (monitorChannel) {
                monitorChannel = null;
                socket.emit('monitor-channel', null);
            }
            setAudioStatus("Already on that channel");
            updateUI();
            refreshConnectionStatus();
            return;
        }

        try {
            await ensureAudioContext();
            monitorChannel = monitorChannel === channelId ? null : channelId;
            nextStartTime = 0;
            socket.emit('monitor-channel', monitorChannel, (response) => {
                if (!response || !response.ok) {
                    monitorChannel = null;
                    setAudioStatus("Monitor unavailable");
                }
                updateUI();
                refreshConnectionStatus();
            });
            updateUI();
            refreshConnectionStatus();
        } catch (err) {
            console.error('Unable to start monitor audio', err);
            monitorChannel = null;
            updateUI();
            refreshConnectionStatus();
            setAudioStatus("Monitor error");
        }
    }

    function syncWithServer() {
        const callsignInput = document.getElementById('callsign');
        const requestedCallsign = getRequestedCallsign();

        if (!requestedCallsign) {
            lastAcceptedCallsign = '';
            if (active) {
                active = false;
                activeChannel = null;
                stopTX(false);
                stopMicPipeline();
                updateUI();
            }
            monitorChannel = null;
            socket.emit('update-status', { callsign: '', activeChannel: null });
            socket.emit('monitor-channel', null);
            refreshConnectionStatus();
            return;
        }

        callsignInput.value = requestedCallsign;
        const robloxInput = document.getElementById('robloxUsername');
        const requestedRobloxUsername = robloxInput.value.trim();

        socket.emit('update-status', { callsign: requestedCallsign, robloxUsername: requestedRobloxUsername, activeChannel }, (response) => {
            if (!response || !response.ok) {
                if (response && response.reason === 'callsign-taken') {
                    callsignInput.value = lastAcceptedCallsign;
                    setCallsignStatus(`CALLSIGN IN USE: ${response.callsign}`);
                }
                return;
            }

            lastAcceptedCallsign = response.callsign;
            if (callsignInput.value !== response.callsign) {
                callsignInput.value = response.callsign;
            }
            if (response.robloxUsername && robloxInput.value !== response.robloxUsername) {
                robloxInput.value = response.robloxUsername;
            }
            refreshConnectionStatus();
        });
    }

    async function registerGlobalPtt() {
        if (!ipcRenderer) return;

        const result = await ipcRenderer.invoke('register-global-ptt', {
            code: pttKeyCode,
            accelerator: pttKeyAccelerator
        });
        if (!result || !result.ok) {
            setAudioStatus(`Global hotkey unavailable: ${pttKeyAccelerator}`);
        }
    }

    function requestTxStart() {
        return new Promise((resolve) => {
            const timeout = setTimeout(() => resolve({ ok: true, assumed: true }), 1200);
            socket.emit('tx-status', { transmitting: true }, (response) => {
                clearTimeout(timeout);
                resolve(response || { ok: false, reason: 'no-response' });
            });
        });
    }

    function updateUI() {
        const ptt = document.getElementById('pttBtn');
        CHANNELS.forEach(channel => {
            const panel = document.querySelector(`[data-channel-panel="${channel.id}"]`);
            const btn = document.querySelector(`[data-channel-connect="${channel.id}"]`);
            const monitorBtn = document.querySelector(`[data-channel-monitor="${channel.id}"]`);
            if (!panel || !btn || !monitorBtn) return;

            const isConnected = activeChannel === channel.id;
            const isMonitoring = monitorChannel === channel.id;
            panel.classList.toggle('connected', isConnected);
            panel.classList.toggle('monitoring', isMonitoring);
            btn.classList.toggle('active', isConnected);
            monitorBtn.classList.toggle('active', isMonitoring);
            monitorBtn.disabled = isConnected;
            btn.innerText = isConnected ? "DISCONNECT" : "CONNECT";
            monitorBtn.innerText = isConnected ? "ON CHANNEL" : (isMonitoring ? "STOP MONITOR" : "MONITOR");
        });
        ptt.disabled = !active;
        ptt.classList.toggle('ready', active);
        ptt.innerText = active ? `HOLD ${pttKeyAccelerator}` : "OFF AIR";
    }

    function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        })[char]);
    }

    function renderUnitList(units) {
        const unitsByChannel = CHANNELS.reduce((acc, channel) => {
            acc[channel.id] = [];
            return acc;
        }, {});

        Object.values(units).forEach(u => {
            if (!u.activeChannel || !unitsByChannel[u.activeChannel]) return;
            unitsByChannel[u.activeChannel].push(u);
        });

        CHANNELS.forEach(channel => {
            const list = document.querySelector(`[data-channel-units="${channel.id}"]`);
            if (!list) return;
            list.innerHTML = unitsByChannel[channel.id]
                .map(u => {
                    const roblox = u.robloxUsername ? ` <span style="color:#8b949e;">(${escapeHtml(u.robloxUsername)})</span>` : '';
                    return `<div class="unit-tag ${u.transmitting ? 'speaking' : ''}">${escapeHtml(u.callsign)}${roblox}</div>`;
                })
                .join('') || "No units connected";
        });
    }

    async function startTX() {
        if (isTalking || isRequestingTx || !active || !audioCtx) return;
        if (!requireCallsign()) return;
        txHeld = true;
        isRequestingTx = true;

        try {
            await ensureAudioContext();
            await startMicPipeline();
            const txGrant = await requestTxStart();
            if (!txGrant.ok) {
                txHeld = false;
                const busyText = txGrant.reason === 'channel-busy'
                    ? `Channel busy: ${txGrant.callsign || 'UNKNOWN'}`
                    : "Unable to transmit";
                setAudioStatus(busyText);
                return;
            }

            if (!txHeld) {
                socket.emit('tx-status', { transmitting: false });
                return;
            }

            isTalking = true;
            resetTxBuffer();
            txPacketGain = 1;
            lastMicPeak = 0;
            document.getElementById('pttBtn').classList.add('active');
            playRadioBeep("start");
        } catch (err) {
            console.error('Unable to start microphone transmit', err);
            stopTX(false);
            stopMicPipeline();
            setAudioStatus("Mic error");
            document.getElementById('socketStatus').innerText = "MIC ERROR";
        } finally {
            isRequestingTx = false;
        }
    }

    function stopTX(playTone = true) {
        txHeld = false;
        if (!isTalking) return;
        if (txOffset > 0 && audioCtx) emitAudioPacket(txBuffer, txOffset);
        resetTxBuffer();
        isTalking = false;
        socket.emit('tx-status', { transmitting: false });
        if (playTone) playRadioBeep("stop");
        document.getElementById('pttBtn').classList.remove('active');
        if (workletNode) {
            workletNode.port.postMessage({ type: 'flush' });
        }
        setAudioStatus(`Idle | TX ${txPackets} | RX ${rxPackets}`);
    }

    // --- RECEIVE (FORCED SYNC) ---
    socket.on('audio-out', (p) => {
        const canReceiveChannel = p.channel === activeChannel || p.channel === monitorChannel;
        if (p.call === document.getElementById('callsign').value || !audioCtx || !canReceiveChannel) return;
        rxPackets++;
        
        const int16 = new Int16Array(p.data);
        let f32 = new Float32Array(int16.length);
        for(let i=0; i<int16.length; i++) f32[i] = int16[i] / MAX_INT16;
        f32 = resampleLinear(f32, p.sampleRate, audioCtx.sampleRate);
        f32 = normalizePlaybackAudio(f32, p.call || 'UNKNOWN');
        
        const buf = audioCtx.createBuffer(1, f32.length, audioCtx.sampleRate);
        buf.getChannelData(0).set(f32);
        
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;

        if (nextStartTime < now + JITTER_MIN || nextStartTime > now + JITTER_MAX) {
            nextStartTime = now + JITTER_TARGET;
        }

        src.start(nextStartTime);
        nextStartTime += buf.duration;
        setAudioStatus(`TX ${txPackets} | RX ${rxPackets} | Buffer ${Math.round((nextStartTime - now) * 1000)}ms`);
    });

    socket.on('connect', () => {
        socketConnected = true;
        refreshConnectionStatus();
        syncWithServer();
    });
    socket.on('disconnect', () => {
        socketConnected = false;
        refreshConnectionStatus();
    });
    socket.on('unit-list-update', (units) => {
        renderUnitList(units);
    });
    socket.on('tx-status', (status) => {
        if (status.activeChannel !== activeChannel && status.activeChannel !== monitorChannel) return;
        if (audioCtx) playRadioBeep(status.transmitting ? "start" : "stop");
    });
    socket.on('callsign-rejected', (info) => {
        if (info && info.callsign) {
            document.getElementById('callsign').value = lastAcceptedCallsign;
            setCallsignStatus(`CALLSIGN IN USE: ${info.callsign}`);
        }
    });
    if (ipcRenderer) {
        ipcRenderer.on('global-ptt-down', () => {
            if (!active) return;
            startTX();
        });
        ipcRenderer.on('global-ptt-up', () => {
            stopTX();
        });
    }

    navigator.mediaDevices.enumerateDevices().then(devs => {
        const sel = document.getElementById('micInput');
        devs.filter(d => d.kind === 'audioinput').forEach(d => sel.innerHTML += `<option value="${d.deviceId}">${d.label || 'Mic'}</option>`);
    });
    document.getElementById('callsign').onchange = syncWithServer;
    document.getElementById('robloxUsername').onchange = syncWithServer;
    document.getElementById('toneUnlockBtn').addEventListener('click', unlockToneBoard);
    document.getElementById('toneCode').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') unlockToneBoard();
    });
    document.getElementById('toneChannel').innerHTML = CHANNELS.map(channel => `<option value="${channel.id}">${escapeHtml(channel.name)}</option>`).join('');
    document.getElementById('toneGrid').innerHTML = TONES.map(tone => `<button class="tone-btn" data-tone="${tone.id}">${escapeHtml(tone.name)}</button>`).join('');
    TONES.forEach(tone => {
        document.querySelector(`[data-tone="${tone.id}"]`).addEventListener('click', () => playToneBoardTone(tone.id));
    });

    document.getElementById('channelGrid').innerHTML = CHANNELS.map(channel => `
        <div class="channel-panel" data-channel-panel="${channel.id}">
            <h3>${escapeHtml(channel.name)}</h3>
            <button class="conn-btn" data-channel-connect="${channel.id}">CONNECT</button>
            <button class="monitor-btn" data-channel-monitor="${channel.id}">MONITOR</button>
            <div class="channel-units" data-channel-units="${channel.id}">No units connected</div>
        </div>
    `).join('');
    CHANNELS.forEach(channel => {
        document.querySelector(`[data-channel-connect="${channel.id}"]`).addEventListener('click', () => setActiveChannel(channel.id));
        document.querySelector(`[data-channel-monitor="${channel.id}"]`).addEventListener('click', () => setMonitorChannel(channel.id));
    });
    updateUI();
    registerGlobalPtt();
</script>
</body>
</html>
